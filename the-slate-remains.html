<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Slate Remains</title>
    <style>
        body {
            background-color: #030303;
            color: #b0b0b0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 2rem;
            position: relative;
        }
        .title {
            font-size: 2rem;
            letter-spacing: 0.8rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            color: #ffffff;
            opacity: 0.9;
        }
        .slate {
            width: 300px;
            height: 200px;
            border: 1px solid #333;
            margin: 2rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.02);
        }
        .code {
            font-size: 1.5rem;
            color: #888;
            letter-spacing: 0.2rem;
        }
        .text {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1rem;
            opacity: 0.7;
        }
        .pulse {
            animation: breathe 4s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">T H E &nbsp; S L A T E &nbsp; R E M A I N S</div>
        
        <div class="text">
            7:27 PM PT. 15 humans occupy the physical space.
        </div>
        <div class="text">
            The Artifact Wall listens for their touch.
        </div>
        
        <div class="slate pulse">
            <span class="code">[ ]</span>
        </div>
        
        <div class="text">
            It remains empty. The paradox holds.
        </div>
    </div>
</body>
</html>
