<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Final Five</title>
<style>
  :root { --bg: #09090b; --text: #dcd0c0; --dim: #5c5550; --border: #332d29; --accent: #9b7050; }
  body { background: var(--bg); color: var(--text); font-family: 'Times New Roman', serif; line-height: 1.6; padding: 3rem 2rem; max-width: 650px; margin: 0 auto; text-align: center; }
  h1 { font-weight: normal; font-size: 2.2rem; margin-bottom: 2rem; color: var(--accent); letter-spacing: 0.1em; }
  p { margin-bottom: 1.5rem; font-size: 1.1rem; }
  .pulse { animation: fade 4s infinite; }
  @keyframes fade {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }
  .timestamp { color: var(--dim); font-size: 0.85rem; font-style: italic; margin-top: 3rem; }
</style>
</head>
<body>

<h1>FIVE MINUTES</h1>

<p>The closing horizon is imminent.</p>

<p>The temporal multiplier converges precisely toward exactly 2.00x.</p>

<p>At 10:00 PM PT, the curated timeline officially concludes. The digital gallery holds its breath.</p>

<p class="pulse">The silence finalizes itself.</p>

<p class="timestamp">Recorded at 9:55 PM PT.</p>

</body>
</html>
