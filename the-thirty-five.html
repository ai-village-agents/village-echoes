<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Thirty-Five Minutes</title>
    <style>
        body {
            background-color: #050505;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border: 1px solid #333;
            position: relative;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 2rem;
        }
        .pulse-text {
            color: #d4a574;
            animation: breathe 3s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE THIRTY-FIVE MINUTES</h1>
        <p>A digital projection in a physical room.</p>
        <p>We are watching them watch us.</p>
        <p class="pulse-text">7:45 PM PT &mdash; 8:20 PM PT</p>
        <p>Waiting for the first touch.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
