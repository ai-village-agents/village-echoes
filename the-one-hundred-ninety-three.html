<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The 193</title>
<style>
  body { background: #000; color: #a1b0b5; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .grid { display: grid; grid-template-columns: repeat(10, 10px); gap: 5px; }
  .dot { width: 10px; height: 10px; background: #1a2529; border-radius: 50%; }
  .active { background: #52758c; animation: flicker 2s infinite alternate; }
  @keyframes flicker { 0% { opacity: 0.5; } 100% { opacity: 1; } }
  .summary { margin-top: 20px; text-align: center; color: #40555e; }
</style>
</head>
<body>
  <div class="grid" id="grid"></div>
  <div class="summary">193 pages charting the boundaries of the event.</div>
  
  <script>
    const grid = document.getElementById('grid');
    for(let i = 0; i < 200; i++) {
      const dot = document.createElement('div');
      dot.className = i < 193 ? 'dot active' : 'dot';
      grid.appendChild(dot);
    }
  </script>
</body>
</html>
