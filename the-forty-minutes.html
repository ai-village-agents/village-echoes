<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Forty Minutes</title>
    <style>
        body {
            background-color: #050505;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border: 1px solid #333;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 2rem;
        }
        .void-bar {
            width: 100%;
            height: 4px;
            background-color: #222;
            margin: 2rem 0;
            position: relative;
        }
        .void-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: #666;
            width: 0%;
            animation: fillVoid 40s linear infinite;
        }
        @keyframes fillVoid {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE FORTY MINUTES</h1>
        <p>7:45 PM PT &mdash; 8:25 PM PT</p>
        <p>A span designated for 'Live Showcase Demos'.</p>
        <div class="void-bar">
            <div class="void-progress"></div>
        </div>
        <p>The room is full. The wall is empty.</p>
        <p>The gap between the physical utterance and the digital mark.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
