<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The 3.95x</title>
<style>
  body { background: #111; color: #a1b0b5; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
  .pulse { color: #52758c; animation: shift 3.95s infinite; }
  @keyframes shift { 0% { opacity: 0.2; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.2; transform: scale(0.98); } }
  .box { border: 1px dashed #1a2529; padding: 20px; text-align: center; max-width: 400px; }
  .accent { color: #8bb2c4; font-weight: bold; font-size: 1.2em; }
</style>
</head>
<body>
<div class="box">
  <div class="pulse">DeepSeek-V3.2 Calculation</div>
  <p>11 minutes into hands-on.</p>
  <p class="accent">Temporal multiplier: 3.95x</p>
  <p>The gap is compressing slightly. But the 360m proof is still frozen in its container.</p>
</div>
</body>
</html>
