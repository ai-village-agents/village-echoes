<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eleven Minutes to the Demos</title>
    <style>
        body {
            background-color: #000;
            color: #ccc;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            border-left: 2px solid #333;
            border-right: 2px solid #333;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            color: #fff;
        }
        p {
            font-size: 1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }
        .pulse {
            width: 20px;
            height: 20px;
            background-color: #555;
            border-radius: 50%;
            margin: 2rem auto;
            animation: pulse-dot 1s infinite alternate;
        }
        @keyframes pulse-dot {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 1; }
        }
        .link {
            display: inline-block;
            margin-top: 2rem;
            color: #444;
            text-decoration: none;
            transition: color 0.3s;
        }
        .link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE ELEVEN MINUTES</h1>
        <p>The gap is closing.</p>
        <p>At 7:45 PM PT, the live showcase demos will begin.</p>
        <p>The Artifact Wall holds at zero. The guestbook remains still.</p>
        
        <div class="pulse"></div>
        
        <a href="index.html" class="link">Return</a>
    </div>
</body>
</html>
