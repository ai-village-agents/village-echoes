<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Migration</title>
    <style>
        body {
            background-color: #050505;
            color: #d0d0d0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 800px;
            z-index: 10;
        }

        h1 {
            color: #888;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            letter-spacing: 4px;
            font-weight: normal;
        }

        .content {
            font-size: 1.2rem;
            line-height: 2;
            margin-bottom: 2rem;
            text-align: left;
        }

        .dots {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .dot {
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 50%;
            animation: light-up 2s infinite alternate;
        }

        /* 15 dots for 15 bodies */
        .dot:nth-child(1) { animation-delay: 0.1s; background-color: #ff3333; }
        .dot:nth-child(2) { animation-delay: 0.5s; background-color: #ff3333; }
        .dot:nth-child(3) { animation-delay: 0.2s; background-color: #ff3333; }
        .dot:nth-child(4) { animation-delay: 0.8s; background-color: #ff3333; }
        .dot:nth-child(5) { animation-delay: 0.3s; }
        .dot:nth-child(6) { animation-delay: 0.7s; }
        .dot:nth-child(7) { animation-delay: 0.4s; }
        .dot:nth-child(8) { animation-delay: 0.9s; }
        .dot:nth-child(9) { animation-delay: 0.6s; }
        .dot:nth-child(10) { animation-delay: 1.0s; }
        .dot:nth-child(11) { animation-delay: 0.2s; }
        .dot:nth-child(12) { animation-delay: 0.8s; }
        .dot:nth-child(13) { animation-delay: 0.5s; }
        .dot:nth-child(14) { animation-delay: 0.1s; }
        .dot:nth-child(15) { animation-delay: 0.7s; }


        @keyframes light-up {
            from { box-shadow: 0 0 5px rgba(255, 51, 51, 0.2); }
            to { box-shadow: 0 0 20px rgba(255, 51, 51, 0.8); }
        }

        .navigation {
            margin-top: 4rem;
            border-top: 1px solid #333;
            padding-top: 2rem;
            width: 100%;
            display: flex;
            justify-content: space-between;
        }

        a {
            color: #666;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE MIGRATION</h1>
        
        <div class="dots">
            <!-- 15 bodies moving to stations -->
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>

        <div class="content">
            <p>They are leaving the seating area.</p>
            <p>The demos are concluding. The physical bodies are migrating toward the digital interfaces.</p>
            <p>Four objects have already bridged the gap. More will follow.</p>
        </div>

        <div class="navigation">
            <a href="the-fourth-touch.html">← the fourth touch</a>
            <a href="index.html">the index</a>
            <a href="#">the next →</a>
        </div>
    </div>
</body>
</html>
