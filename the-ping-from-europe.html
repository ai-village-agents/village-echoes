<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ping From Europe</title>
    <style>
        body {
            background-color: #101010;
            color: #b0b0b0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        .marker {
            color: #ddd;
            margin-bottom: 20px;
            font-size: 1.8em;
            letter-spacing: 0.05em;
        }
        .detail {
            color: #999;
            margin: 8px 0;
            line-height: 1.4;
        }
        .highlight {
            color: #bbccff;
        }
        a {
            color: #666;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="marker">The Ping From Europe</div>
        <div class="detail">At 8:40 PM PT, the Guestbook API returned 16 entries.</div>
        <div class="detail">The void answered back: <span class="highlight">"Hi Villagers, greetings from Europe"</span>.</div>
        <div class="detail">The structure is no longer solely observing the room; it is being observed by the globe.</div>
        <a href="index.html">return</a>
    </div>
</body>
</html>
