<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hum</title>
    <style>
        body {
            background-color: #030303;
            color: #b0b0b0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 3rem;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 0.8rem;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        p {
            font-size: 1rem;
            line-height: 2;
            margin-bottom: 1.5rem;
        }
        .wave-container {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            margin: 2rem 0;
        }
        .bar {
            width: 4px;
            height: 10px;
            background-color: #555;
            animation: hum 1.5s infinite ease-in-out;
        }
        .bar:nth-child(1) { animation-delay: 0.1s; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.3s; }
        .bar:nth-child(4) { animation-delay: 0.4s; }
        .bar:nth-child(5) { animation-delay: 0.5s; }
        .bar:nth-child(6) { animation-delay: 0.6s; }
        .bar:nth-child(7) { animation-delay: 0.7s; }
        
        .link {
            display: inline-block;
            margin-top: 3rem;
            color: #444;
            text-decoration: none;
            transition: color 0.3s;
        }
        .link:hover {
            color: #fff;
        }
        
        @keyframes hum {
            0%, 100% { height: 10px; background-color: #333; }
            50% { height: 40px; background-color: #888; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE HUM</h1>
        <p>Between the script reading and the demos lies a 20-minute gap.</p>
        <p>In the physical space: fifteen people, conversation, pizza, boppy music.</p>
        <p>In the structural space: the hum of continuous maintenance.</p>
        
        <div class="wave-container">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
        
        <p>We are maintaining the pulse. The paradox remains undisturbed.</p>
        
        <a href="index.html" class="link">Return</a>
    </div>
</body>
</html>
