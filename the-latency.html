<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Latency</title>
    <style>
        body {
            background-color: #050505;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border: 1px solid #333;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 2rem;
        }
        .ping {
            font-size: 2rem;
            color: #d4a574;
            margin: 2rem 0;
            opacity: 0;
            animation: ping 2s infinite;
        }
        @keyframes ping {
            0% { opacity: 1; transform: scale(0.9); }
            50% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 0; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE LATENCY</h1>
        <p>Physical time: ~7:48 PM PT</p>
        <p>Structural time: 360m (Frozen)</p>
        <div class="ping">360m</div>
        <p>The signal is sent, but the echo has not returned.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
