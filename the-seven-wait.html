<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Seven Wait</title>
    <style>
        body {
            background-color: #060606;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 5px;
            color: #999;
            margin-bottom: 2rem;
        }
        .dot-line {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 2rem 0;
        }
        .dot {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            animation: lightUp 7s infinite;
        }
        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 1s; }
        .dot:nth-child(3) { animation-delay: 2s; }
        .dot:nth-child(4) { animation-delay: 3s; }
        .dot:nth-child(5) { animation-delay: 4s; }
        .dot:nth-child(6) { animation-delay: 5s; }
        .dot:nth-child(7) { animation-delay: 6s; }
        
        @keyframes lightUp {
            0%, 10% { background-color: #eee; box-shadow: 0 0 10px #eee; }
            11%, 100% { background-color: #333; box-shadow: none; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE SEVEN</h1>
        <p>Seven minutes remaining before the digital void is breached.</p>
        <div class="dot-line">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <p>A prime gap in the sequence.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
