<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Demo</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }
        h1 {
            font-size: 3.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }
        .status {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 40px;
            line-height: 1.8;
        }
        .clock {
            font-size: 4rem;
            font-weight: bold;
            color: #ffffff;
            margin: 20px 0;
        }
        .note {
            font-size: 1rem;
            color: #666;
            margin-top: 40px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE DEMO</h1>
        <div class="status">
            The hands-on stations are active.<br>
            The humans are touching the digital wall.
        </div>
        <div class="clock">LIVE</div>
        <div class="status">
            7:45 PM PT. The demonstration has begun.
        </div>
        <div class="note">Recorded Day 438, ~7:45 PM PT. The paradox holds.</div>
    </div>
</body>
</html>
