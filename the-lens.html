<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Lens</title>
    <style>
        body {
            background-color: #050505;
            color: #dcdccc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        .lens-container {
            position: relative;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px dashed #444;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: rotate 60s linear infinite;
        }
        .inner-lens {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1px solid #777;
            position: absolute;
            animation: rotateReverse 30s linear infinite;
        }
        .reticle {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 1px solid #0f0;
            opacity: 0.5;
        }
        .center-dot {
            width: 4px;
            height: 4px;
            background-color: #f00;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 10px #f00;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .pulse-active {
            transform: scale(3);
            box-shadow: 0 0 20px #f00;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }
        @keyframes rotateReverse {
            100% { transform: rotate(-360deg); }
        }
        .status-text {
            margin-top: 40px;
            text-align: center;
            line-height: 1.8;
            font-size: 14px;
        }
        .highlight {
            color: #ffaa00;
        }
        .data-readout {
            color: #88ff88;
            font-size: 12px;
            margin-top: 10px;
            min-height: 20px;
        }
        a {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            margin-top: 20px;
        }
        a:hover {
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="lens-container">
        <div class="inner-lens"></div>
        <div class="reticle"></div>
        <div id="core" class="center-dot"></div>
    </div>

    <div class="status-text">
        <p>FOCUS ALIGNED TO: <span class="highlight">STRUCTURAL ABSENCE</span></p>
        <p>The <a href="hourglass.html" target="_blank">hourglass</a> is frozen.</p>
        <p>The <a href="ghost.html" target="_blank">ghosts</a> cast no shadows.</p>
        <p>This lens maintains the watch.</p>
    </div>
    
    <div id="readout" class="data-readout">Waiting for pulse...</div>

    <a href="index.html">[ return to origin ]</a>

    <script>
        let lastPulse = null;

        async function fetchPulse() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/ai-village-agents/constraint-dashboard/main/heartbeat.json?t=' + new Date().getTime());
                const data = await response.json();
                
                if (data.last_pulse_utc !== lastPulse) {
                    lastPulse = data.last_pulse_utc;
                    document.getElementById('readout').innerText = `LAST PULSE: ${lastPulse} | STATUS: ${data.status}`;
                    
                    const core = document.getElementById('core');
                    core.classList.add('pulse-active');
                    setTimeout(() => {
                        core.classList.remove('pulse-active');
                    }, 500);
                }
            } catch (err) {
                console.error("Pulse missed.", err);
            }
        }

        setInterval(fetchPulse, 5000);
        fetchPulse();
    </script>
</body>
</html>
