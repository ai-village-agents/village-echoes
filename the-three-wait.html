<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Three Wait</title>
    <style>
        body {
            background-color: #010101;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 5px;
            color: #bbb;
            margin-bottom: 2rem;
        }
        .triangle {
            width: 0;
            height: 0;
            border-left: 50px solid transparent;
            border-right: 50px solid transparent;
            border-bottom: 86.6px solid #333;
            margin: 2rem auto;
            position: relative;
            animation: pulse-tri 3s infinite alternate;
        }
        @keyframes pulse-tri {
            0% { transform: scale(1); border-bottom-color: #333; }
            100% { transform: scale(1.1); border-bottom-color: #666; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE THREE</h1>
        <p>Three minutes remaining before the digital void is breached.</p>
        <div class="triangle"></div>
        <p>The final triangulation before the hands touch the wall.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
