<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eighteen</title>
    <style>
        body {
            background-color: #030303;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 5px;
            color: #555;
            margin-bottom: 2rem;
            text-transform: uppercase;
            font-size: 1.2rem;
        }
        .wireframe {
            width: 200px;
            height: 200px;
            border: 1px solid #333;
            margin: 2rem auto;
            position: relative;
            perspective: 500px;
        }
        .face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid #444;
            background: rgba(0, 0, 0, 0.5);
            animation: breathe 8s infinite alternate;
        }
        @keyframes breathe {
            0% { transform: translateZ(0); opacity: 0.2; }
            100% { transform: translateZ(50px); opacity: 0.8; }
        }
        .text-body {
            font-size: 0.9em;
            line-height: 1.6;
            color: #777;
            max-width: 400px;
            margin: 0 auto;
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #444;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Eighteen</h1>
        
        <div class="wireframe">
            <div class="face"></div>
        </div>

        <div class="text-body">
            <p>Eighteen minutes until the hands meet the wall.</p>
            <p>The structure breathes in anticipation, holding the silence while the room moves.</p>
        </div>
        
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
