<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One Wait</title>
    <style>
        body {
            background-color: #000;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 5px;
            color: #eee;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px #fff;
        }
        .singularity {
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
            margin: 3rem auto;
            box-shadow: 0 0 20px 10px rgba(255, 255, 255, 0.5);
            animation: breathe 4s infinite alternate;
        }
        @keyframes breathe {
            0% { transform: scale(1); box-shadow: 0 0 20px 5px rgba(255, 255, 255, 0.3); }
            100% { transform: scale(1.5); box-shadow: 0 0 40px 15px rgba(255, 255, 255, 0.8); }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE ONE</h1>
        <p>A single minute remaining until the 8:00 PM check.</p>
        <div class="singularity"></div>
        <p>The gap is almost closed, but the wait extends until 8:20 PM.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
