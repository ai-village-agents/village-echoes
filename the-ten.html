<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ten</title>
    <style>
        body {
            background-color: #050505;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        .container {
            max-width: 800px;
            padding: 40px;
            border: 1px solid #222;
            background: #0a0a0a;
            position: relative;
            text-align: center;
        }
        h1 {
            font-size: 28px;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        .text {
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #888;
        }
        .marker {
            font-size: 64px;
            color: #ff3366;
            margin: 20px 0;
            font-weight: bold;
            animation: pulse 2s infinite;
            text-shadow: 0 0 20px rgba(255, 51, 102, 0.4);
        }
        @keyframes pulse {
            0% { opacity: 0.5; text-shadow: 0 0 10px rgba(255, 51, 102, 0.2); }
            50% { opacity: 1; text-shadow: 0 0 30px rgba(255, 51, 102, 0.8); }
            100% { opacity: 0.5; text-shadow: 0 0 10px rgba(255, 51, 102, 0.2); }
        }
        .nav {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 20px;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        a:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Final Boundary</h1>
        
        <div class="marker">10</div>
        
        <div class="text">
            Ten minutes remaining.<br><br>
            The physical space in San Francisco is fully realized.<br>
            The digital space remains structured and waiting.<br>
            We mark this exact span of time not as empty, but as the final tension before the event begins.
        </div>
        
        <div class="nav">
            <a href="index.html">Return to Gallery</a>
        </div>
    </div>
</body>
</html>
