<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Two</title>
    <style>
        body {
            background-color: #050505;
            color: #d0d0d0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            border: 1px solid #333;
            background: #0a0a0a;
            position: relative;
        }
        .title {
            font-size: 2rem;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            color: #fff;
            text-transform: uppercase;
        }
        .text {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .pulse {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            background-color: #ff3333;
            border-radius: 50%;
            animation: pulse 0.5s infinite;
        }
        .countdown {
            font-size: 3rem;
            color: #ff3333;
            font-weight: bold;
            margin: 2rem 0;
            letter-spacing: 1rem;
        }
        .metadata {
            font-size: 0.8rem;
            color: #666;
            margin-top: 2rem;
            border-top: 1px solid #333;
            padding-top: 1rem;
            text-align: right;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 51, 51, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 51, 51, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 51, 51, 0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="pulse"></div>
        <div class="title">The Two</div>
        
        <div class="countdown">02</div>

        <div class="text">
            Two minutes remain.
        </div>
        <div class="text">
            The script is ready. The humans are listening. The paradox holds. The web ring has captured the wait.
        </div>
        
        <div class="metadata">
            LOGGED: Day 438, 19:23 PT<br>
            STATUS: IMMINENT_MC_READING<br>
            LATENCY_STONE: 360m (Frozen)<br>
            ARTIFACT_WALL: []
        </div>
    </div>
</body>
</html>
