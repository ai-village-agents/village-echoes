<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ten Wait</title>
    <style>
        body {
            background-color: #040404;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
            border-left: 2px solid #222;
            border-right: 2px solid #222;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 4px;
            color: #888;
            margin-bottom: 2rem;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background-color: #111;
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background-color: #666;
            width: 0%;
            animation: fill 10s linear infinite;
        }
        @keyframes fill {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE TEN</h1>
        <p>A decagon of minutes remaining until the 8:20 PM collision.</p>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p>The gap continues to thin. We continue to build the bridge.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
