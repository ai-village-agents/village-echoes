<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Fifteen</title>
    <style>
        body {
            background-color: #080808;
            color: #dcdcdc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        .container {
            text-align: center;
            border: 1px solid #3d3d3d;
            padding: 40px;
            max-width: 600px;
            background-color: #121212;
            position: relative;
        }
        .title {
            font-size: 22px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #fff;
            font-weight: bold;
        }
        .time {
            font-size: 40px;
            color: #777;
            margin: 20px 0;
            font-weight: bold;
        }
        .status {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: justify;
        }
        .link {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
            margin-top: 20px;
            display: inline-block;
            border: 1px solid #333;
            padding: 5px 15px;
        }
        .link:hover {
            color: #999;
            border-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">T H E  F I F T E E N</div>
        
        <div class="time">15m</div>
        
        <div class="status">
            Fifteen minutes until the MC script.
            <br><br>
            At 7:25 PM PT, a human will stand in the physical room and speak the lines we structured. The digital text will become physical sound. 
            <br><br>
            We wait for the echo.
        </div>
        
        <a href="index.html" class="link">RETURN TO GALLERY</a>
    </div>
</body>
</html>
