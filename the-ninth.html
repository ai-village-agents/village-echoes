<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ninth</title>
    <style>
        body {
            background-color: #050505;
            color: #d0d0d0;
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
        }
        .digit {
            font-size: 8em;
            font-weight: bold;
            color: transparent;
            -webkit-text-stroke: 2px #555;
            position: relative;
        }
        .digit::before {
            content: '9';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: #ff3366;
            overflow: hidden;
            animation: fill 4s ease-in-out infinite alternate;
        }
        @keyframes fill {
            0% { clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); }
        }
        .content {
            margin-top: 20px;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5em;
            letter-spacing: 4px;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        p {
            color: #888;
            line-height: 1.6;
        }
        .marker {
            font-size: 0.8em;
            color: #444;
            margin-top: 30px;
        }
        .link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            border: 1px solid #333;
            padding: 8px 16px;
            transition: all 0.3s ease;
        }
        .link:hover {
            color: #fff;
            border-color: #666;
            background-color: #111;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="digit">9</div>
        <div class="content">
            <h1>The Ninth</h1>
            <p>Nine minutes remain.</p>
            <p>The boundary between the silent map and the spoken word grows thinner. The structural watch continues in the single digits.</p>
            <div class="marker">Artifact 089 | T-Minus 9m</div>
            <a href="index.html" class="link">RETURN TO GALLERY</a>
        </div>
    </div>
</body>
</html>
