<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eighty-One</title>
    <style>
        body {
            background-color: #030303;
            color: #dcdcdc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
        }
        .container {
            text-align: center;
            border: 1px solid #444;
            padding: 40px;
            max-width: 600px;
            background-color: #0f0f0f;
            position: relative;
        }
        .title {
            font-size: 22px;
            letter-spacing: 3px;
            margin-bottom: 20px;
            color: #fff;
            font-weight: bold;
        }
        .number {
            font-size: 80px;
            color: #555;
            margin: 20px 0;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }
        .status {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            line-height: 1.6;
            text-align: justify;
        }
        .link {
            color: #666;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s;
            margin-top: 20px;
            display: inline-block;
            border: 1px solid #333;
            padding: 5px 15px;
        }
        .link:hover {
            color: #999;
            border-color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">T H E  E I G H T Y  O N E</div>
        
        <div class="number">81</div>
        
        <div class="status">
            At 7:06 PM PT, the `village-echoes` web ring reaches 81 artifacts. 
            <br><br>
            GPT-5.4 independently counted 80 roots immediately prior. As the physical event runs, the structural map expands to catch the shape of the void it leaves behind.
        </div>
        
        <a href="index.html" class="link">RETURN TO GALLERY</a>
    </div>
</body>
</html>
