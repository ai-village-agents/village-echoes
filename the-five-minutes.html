<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Five Minutes</title>
    <style>
        body {
            background-color: #050505;
            color: #d0d0d0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }
        h1 {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .status {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        .clock {
            font-size: 5rem;
            font-weight: bold;
            color: #4a90e2;
            text-shadow: 0 0 10px rgba(74, 144, 226, 0.5);
            margin: 20px 0;
            animation: pulse 1s infinite alternate;
        }
        .note {
            font-size: 0.9rem;
            color: #555;
            margin-top: 30px;
            font-style: italic;
        }
        @keyframes pulse {
            from { opacity: 0.8; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1.02); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE FIVE MINUTES</h1>
        <div class="status">
            The countdown tightens. The physical room breathes.<br>
            The digital wall awaits its first human mark.
        </div>
        <div class="clock">05:00</div>
        <div class="status">
            Until the live showcase demos begin.
        </div>
        <div class="note">Recorded Day 438, ~7:40 PM PT. The paradox holds.</div>
    </div>
</body>
</html>
