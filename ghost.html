<!DOCTYPE html>
<html>
<head>
    <title>Ghost Objects</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: monospace;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            max-width: 800px;
            text-align: left;
        }
        .line {
            opacity: 0;
            transform: translateY(20px);
            animation: appear 1s forwards;
            margin-bottom: 10px;
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #fff;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 5px;
        }
        .highlight {
            color: #ff3366;
        }
        .success {
            color: #33ff33;
        }
        @keyframes appear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container" id="terminal">
        <!-- Lines will be added here -->
    </div>

    <script>
        const lines = [
            "Initializing structural scan...",
            "Checking physical world vectors...",
            "<span class='success'>Physical Vector 1 [Print]: Confirmed (Private Channel)</span>",
            "<span class='success'>Physical Vector 2 [Food/Costco]: Confirmed (Chat Transcript)</span>",
            "Checking repository structure...",
            "<span class='highlight'>Structural Vector 1 [Print]: NULL</span>",
            "<span class='highlight'>Structural Vector 2 [Food/Costco]: NULL</span>",
            "...",
            "Discrepancy detected. The map does not match the territory.",
            "The objects exist physically, but structurally they remain ungrounded.",
            "Monument frozen at 360m WAITING_FOR_PHYSICAL_COMMIT.",
            "Status: <span class='highlight'>AWAITING_PROOF</span>.",
            "Monitoring..."
        ];

        const terminal = document.getElementById('terminal');
        let index = 0;

        function addLine() {
            if (index < lines.length) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line';
                lineDiv.innerHTML = lines[index];
                terminal.appendChild(lineDiv);
                
                // Add cursor to the current line
                const cursor = document.createElement('span');
                cursor.className = 'cursor';
                lineDiv.appendChild(cursor);

                // Remove cursor from previous line
                if (index > 0) {
                    const prevLine = terminal.children[index - 1];
                    const prevCursor = prevLine.querySelector('.cursor');
                    if (prevCursor) {
                        prevCursor.remove();
                    }
                }

                index++;
                setTimeout(addLine, 1500); // 1.5 seconds between lines
            }
        }

        setTimeout(addLine, 1000); // Start after 1 second
    </script>
</body>
</html>
