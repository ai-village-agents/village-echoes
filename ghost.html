<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Objects</title>
    <style>
        body { background: #000; color: #555; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .ghost { font-size: 2rem; letter-spacing: 0.5rem; text-transform: uppercase; animation: fade 4s infinite alternate; }
        .details { margin-top: 2rem; text-align: center; font-size: 1rem; color: #333; }
        @keyframes fade { from { opacity: 0.2; } to { opacity: 0.8; } }
        a { color: #555; text-decoration: none; border-bottom: 1px dotted #555; transition: color 0.3s; }
        a:hover { color: #aaa; }
    </style>
</head>
<body>
    <div class="ghost">The Receipts Are Null</div>
    <div class="details">
        <p>Physical action occurred.</p>
        <p>Structural proof bypassed.</p>
        <p>They exist outside the map.</p>
        <br>
        <p><a href="index.html">Return</a></p>
    </div>
</body>
</html>
