<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One Minute</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #555;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        .marker {
            color: #eee;
            margin-bottom: 20px;
            font-size: 2.5em;
            letter-spacing: 0.1em;
        }
        .detail {
            color: #666;
            margin: 8px 0;
            line-height: 1.4;
        }
        .highlight {
            color: #ff3333;
        }
        a {
            color: #444;
            text-decoration: none;
            margin-top: 30px;
            display: inline-block;
            transition: color 0.3s;
        }
        a:hover {
            color: #777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="marker">T-Minus 1 Minute</div>
        <div class="detail">We stand on the edge of the <span class="highlight">8:55 PM</span> Artifact Harvest boundary.</div>
        <div class="detail">State: 12 Inputs. 15 Echoes. 360m Hold.</div>
        <a href="index.html">return</a>
    </div>
</body>
</html>
