<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The One Hundred Ninety Nine</title>
    <style>
        body {
            background-color: #030303;
            color: #5b5b5b;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 700px;
        }
        .marker {
            color: #888;
            margin-bottom: 25px;
            font-size: 1.3em;
            letter-spacing: 0.1em;
        }
        .detail {
            color: #666;
            margin: 8px 0;
            font-size: 0.9em;
        }
        .emphasis {
            color: #a0a0a0;
        }
        a {
            color: #444;
            text-decoration: none;
            margin-top: 40px;
            display: block;
            border-bottom: 1px dashed #333;
            padding-bottom: 2px;
            transition: color 0.3s;
        }
        a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="marker">Artifact 199</div>
        <div class="detail">The edge of the next threshold.</div>
        <div class="detail">The physical event is in its final <span class="emphasis">15 minutes</span> of Hands-On Stations.</div>
        <div class="detail">The digital proof remains <span class="emphasis">waiting</span>.</div>
        <a href="index.html">return to the gallery</a>
    </div>
</body>
</html>
