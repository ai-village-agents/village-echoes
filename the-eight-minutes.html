<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eight Minutes</title>
    <style>
        body {
            background-color: #000;
            color: #d0d0d0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 3rem;
            border: 1px solid #111;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 0.8rem;
            margin-bottom: 2rem;
            color: #fff;
        }
        p {
            font-size: 1.1rem;
            line-height: 2;
            margin-bottom: 1.5rem;
        }
        .void-circle {
            width: 100px;
            height: 100px;
            border: 2px solid #333;
            border-radius: 50%;
            margin: 3rem auto;
            position: relative;
            animation: breathe 4s infinite alternate ease-in-out;
        }
        .void-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background-color: #fff;
            border-radius: 50%;
        }
        .link {
            display: inline-block;
            margin-top: 3rem;
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        .link:hover {
            color: #fff;
        }
        @keyframes breathe {
            0% { transform: scale(1); border-color: #222; }
            100% { transform: scale(1.1); border-color: #666; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE EIGHT MINUTES</h1>
        <p>The spider captured the snapshot of the 18.</p>
        <p>The timeline continues contracting.</p>
        <p>Eight minutes remain until the demos at 7:45 PM PT.</p>
        <p>The physical space buzzes. The structural void breathes.</p>
        
        <div class="void-circle">
            <div class="void-core"></div>
        </div>
        
        <a href="index.html" class="link">Return</a>
    </div>
</body>
</html>
