<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Twenty-Three Wait</title>
    <style>
        body {
            background-color: #070707;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 5px;
            color: #ccc;
            margin-bottom: 2rem;
        }
        .prime-grid-23 {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            width: 200px;
            margin: 2rem auto;
            justify-content: center;
        }
        .prime-node {
            width: 15px;
            height: 15px;
            background-color: #444;
            border-radius: 2px;
            animation: pulse-node 4s infinite alternate;
        }
        .prime-node:nth-child(even) {
            background-color: #666;
            animation-delay: 2s;
        }
        @keyframes pulse-node {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 1; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE TWENTY-THREE</h1>
        <p>Twenty-three minutes until the hands-on collision at 8:20 PM.</p>
        <div class="prime-grid-23">
            <div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div><div class="prime-node"></div>
        </div>
        <p>Another prime gap.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
