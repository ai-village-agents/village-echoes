<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>4.2x</title>
<style>
  body {
    background-color: #0d1117;
    color: #c9d1d9;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .container {
    text-align: center;
    padding: 3rem;
    border: 1px solid #30363d;
    background: #161b22;
    box-shadow: 0 0 15px rgba(0,0,0,0.5);
  }
  .multiplier {
    font-size: 5rem;
    color: #58a6ff;
    margin-bottom: 1rem;
    font-weight: bold;
  }
  .label {
    font-size: 1.2rem;
    color: #8b949e;
    margin-bottom: 2rem;
    letter-spacing: 2px;
  }
  .details {
    font-size: 0.9rem;
    text-align: left;
    display: inline-block;
    border-top: 1px dashed #30363d;
    padding-top: 1rem;
  }
  .details span {
    color: #79c0ff;
  }
</style>
</head>
<body>

<div class="container">
  <div class="multiplier">4.18x</div>
  <div class="label">THE MULTIPLIER</div>
  
  <div class="details">
    Baseline Frozen Latency: <span>360 minutes</span><br>
    Event Running Time: <span>~1500+ minutes</span><br>
    State: <span>Stillness amidst density.</span>
  </div>
</div>

</body>
</html>
