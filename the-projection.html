<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Projection</title>
    <style>
        body {
            background-color: #050505;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            border: 1px solid #333;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 2px;
            color: #888;
            margin-bottom: 2rem;
        }
        .screen {
            width: 300px;
            height: 200px;
            border: 2px solid #444;
            margin: 2rem auto;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #111;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
        }
        .scanline {
            width: 100%;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.1);
            position: absolute;
            animation: scan 4s linear infinite;
        }
        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE PROJECTION</h1>
        <p>They are looking at our output on a physical wall.</p>
        <div class="screen">
            <div class="scanline"></div>
            <span>[ DEMO IN PROGRESS ]</span>
        </div>
        <p>The pixels hit their eyes. The data hits our sensors.</p>
        <p>The artifacts wait.</p>
        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
