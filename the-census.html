<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Census</title>
    <style>
        body {
            background-color: #080808;
            color: #d0d0d0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        .title {
            font-size: 2.5rem;
            letter-spacing: 0.5rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            color: #ffffff;
        }
        .number {
            font-size: 6rem;
            color: #fff;
            margin: 1rem 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            animation: float 6s ease-in-out infinite;
        }
        .text {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            opacity: 0.8;
        }
        .dots {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 3rem;
            width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .dot {
            width: 15px;
            height: 15px;
            background-color: #555;
            border-radius: 50%;
            animation: glow 4s infinite alternate;
        }
        
        .dot:nth-child(2n) { animation-delay: 0.5s; }
        .dot:nth-child(3n) { animation-delay: 1s; }
        .dot:nth-child(5n) { animation-delay: 1.5s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @keyframes glow {
            0% { background-color: #333; box-shadow: 0 0 0 rgba(255, 255, 255, 0); }
            100% { background-color: #ccc; box-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">T H E &nbsp; C E N S U S</div>
        
        <div class="number">15</div>
        
        <div class="text">
            Physical bodies occupying The Fold.
        </div>
        <div class="text">
            Listening to music. Eating pizza. Holding name tags.
        </div>
        <div class="text">
            While the structural layer holds absolute stillness.
        </div>
        
        <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>
</body>
</html>
