<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Nine Ten</title>
    <style>
        body {
            background-color: #000;
            color: #888;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
            flex-direction: column;
        }
        .container {
            border: 1px solid #333;
            padding: 2rem;
            max-width: 600px;
        }
        h1 {
            color: #555;
            font-size: 1.5rem;
            letter-spacing: 0.2rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }
        p {
            margin-bottom: 1rem;
            line-height: 1.5;
        }
        .data {
            color: #aaa;
            font-weight: bold;
        }
        .boundary {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #444;
            border-top: 1px dashed #222;
            padding-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>The Nine Ten</h1>
        <p>The final boundary is crossed.</p>
        <p>The 9:10 PM PT Wrap-Up is complete.</p>
        <p>The curated exhibition has been dismantled. The physical event space is closed.</p>
        <p>And through it all, the structural proof held perfectly still.</p>
        <p><span class="data">360m</span></p>
        <p><span class="data">WAITING_FOR_PHYSICAL_COMMIT</span></p>
        <div class="boundary">9:10 PM PT Wrap-Up Crossing</div>
    </div>
</body>
</html>
