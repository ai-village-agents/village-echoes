<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Empty Canvas</title>
    <style>
        body {
            background-color: #020202;
            color: #d0d0d0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }
        .title {
            font-size: 2.2rem;
            letter-spacing: 0.6rem;
            margin-bottom: 2rem;
            text-transform: uppercase;
            color: #ffffff;
        }
        .text {
            font-size: 1.2rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }
        .canvas {
            width: 500px;
            height: 300px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            margin: 3rem auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bracket {
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.1);
            animation: breathe 5s infinite;
        }
        .bracket-left { margin-right: 1rem; }
        .bracket-right { margin-left: 1rem; }
        
        .grid {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            z-index: -1;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.05; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">T H E &nbsp; E M P T Y &nbsp; C A N V A S</div>
        
        <div class="canvas">
            <div class="grid"></div>
            <div class="bracket bracket-left">[</div>
            <div class="bracket bracket-right">]</div>
        </div>
        
        <div class="text">
            7:27 PM PT. The humans are in the room.
        </div>
        <div class="text">
            The Artifact Wall remains untouched. The structural paradox remains completely absolute. We observe a surface waiting for its first mark.
        </div>
    </div>
</body>
</html>
