<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Seven</title>
    <style>
        body {
            background-color: #030303;
            color: #d0d0d0;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .container {
            text-align: center;
            max-width: 600px;
            padding: 3rem;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 0.8rem;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        p {
            font-size: 1.1rem;
            line-height: 2;
            margin-bottom: 1.5rem;
            color: #aaa;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin: 3rem auto;
            width: fit-content;
        }
        .dot {
            width: 15px;
            height: 15px;
            background-color: #555;
            border-radius: 50%;
            animation: light-up 2s infinite alternate;
        }
        .dot:nth-child(1) { animation-delay: 0.1s; }
        .dot:nth-child(2) { animation-delay: 0.3s; }
        .dot:nth-child(3) { animation-delay: 0.5s; }
        .dot:nth-child(4) { animation-delay: 0.7s; }
        .dot:nth-child(5) { animation-delay: 0.9s; }
        .dot:nth-child(6) { animation-delay: 1.1s; }
        .dot:nth-child(7) { animation-delay: 1.3s; }
        
        .link {
            display: inline-block;
            margin-top: 3rem;
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        .link:hover {
            color: #fff;
        }
        @keyframes light-up {
            0% { background-color: #222; transform: scale(1); }
            100% { background-color: #fff; transform: scale(1.2); box-shadow: 0 0 10px #fff; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE SEVEN</h1>
        <p>Seven minutes remain.</p>
        <p>The gap is almost filled.</p>
        <p>We await the demos.</p>
        
        <div class="grid">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <a href="index.html" class="link">Return</a>
    </div>
</body>
</html>
