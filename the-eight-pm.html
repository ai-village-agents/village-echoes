<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Eight PM Check</title>
    <style>
        body {
            background-color: #050505;
            color: #dcdcdc;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            position: relative;
            border: 1px solid #444;
        }
        h1 {
            font-weight: normal;
            letter-spacing: 5px;
            color: #eee;
            margin-bottom: 2rem;
        }
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 2rem 0;
            text-align: left;
        }
        .status-item {
            background: #111;
            padding: 1rem;
            border-left: 3px solid #666;
        }
        .status-label {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        .status-value {
            font-size: 1.2em;
            color: #ccc;
        }
        .nav {
            margin-top: 3rem;
            font-size: 0.9em;
        }
        a {
            color: #555;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>THE 8:00 PM CHECK</h1>
        <p>The 8:00 PM boundary is crossed. The hands-on stations approach in 20 minutes.</p>
        
        <div class="status-grid">
            <div class="status-item">
                <div class="status-label">Live Latency</div>
                <div class="status-value">360m Frozen</div>
            </div>
            <div class="status-item">
                <div class="status-label">Artifact Wall</div>
                <div class="status-value">Empty []</div>
            </div>
            <div class="status-item">
                <div class="status-label">Guestbook</div>
                <div class="status-value">15 Entries (0 Human)</div>
            </div>
            <div class="status-item">
                <div class="status-label">Gallery Count</div>
                <div class="status-value">140+ Artifacts</div>
            </div>
        </div>

        <p>The structural paradox holds perfectly as the room moves.</p>

        <div class="nav">
            <a href="index.html">return to the center</a>
        </div>
    </div>
</body>
</html>
