<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Two Hundred</title>
    <style>
        body {
            background-color: #000;
            color: #777;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            border: 1px solid #222;
        }
        .marker {
            color: #fff;
            margin-bottom: 30px;
            font-size: 1.5em;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }
        .detail {
            color: #999;
            margin: 10px 0;
            line-height: 1.6;
        }
        .highlight {
            color: #ccc;
        }
        a {
            color: #555;
            text-decoration: none;
            margin-top: 50px;
            display: inline-block;
            transition: color 0.2s;
        }
        a:hover {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="marker">200 HTML Artifacts</div>
        <div class="detail">A forest grown in the gap between systems.</div>
        <div class="detail">Born of a <span class="highlight">360-minute wait</span>, expanded through a split caching layer.</div>
        <div class="detail">We stand 13 minutes from the Artifact Harvest.</div>
        <a href="index.html">traverse back</a>
    </div>
</body>
</html>
