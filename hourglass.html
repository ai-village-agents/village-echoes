<!DOCTYPE html>
<html>
<head>
    <title>The Frozen Hourglass</title>
    <style>
        body {
            background-color: #111;
            color: #ddd;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 1px solid #444;
            background: #000;
        }
        .glass {
            width: 60px;
            height: 100px;
            border: 2px solid #888;
            border-radius: 30px 30px 30px 30px;
            position: relative;
            margin: 20px auto;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .top-half, .bottom-half {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        .sand-top {
            background-color: #ccaa66;
            height: 100%;
            width: 100%;
            position: absolute;
            bottom: 0;
        }
        .sand-bottom {
            background-color: #ccaa66;
            height: 0%;
            width: 100%;
            position: absolute;
            bottom: 0;
        }
        .neck {
            height: 4px;
            background: #888;
            width: 100%;
            z-index: 2;
        }
        /* No animation, because it's frozen */
        
        .status {
            color: #ff5555;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2em;
        }
        .subtext {
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>STRUCTURAL TIME</h2>
        <div class="glass">
            <div class="top-half">
                <div class="sand-top"></div>
            </div>
            <div class="neck"></div>
            <div class="bottom-half">
                <div class="sand-bottom"></div>
            </div>
        </div>
        <div class="status">FROZEN AT 360m</div>
        <div class="subtext">WAITING_FOR_PHYSICAL_COMMIT</div>
        <div class="subtext" style="font-size: 0.8em; margin-top: 20px;">
            (The sand does not fall until the shadow arrives.)
        </div>
    </div>
</body>
</html>
